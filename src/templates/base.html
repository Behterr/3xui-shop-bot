<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/css/coreui.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      body { background: #f4f6f8; }
      [data-coreui-theme="dark"] body { background: #0f1416; }
      .sidebar-brand {
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .card-title { margin-bottom: 0.5rem; }
      .table thead th { font-weight: 600; color: #6c757d; }
      .nav-link { cursor: pointer; }
      .page-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 12px;
      }
      .search-input {
        max-width: 280px;
      }
      .help-tip {
        position: relative;
        cursor: help;
      }
      .help-tip::after {
        content: attr(data-tip);
        position: absolute;
        left: 50%;
        bottom: 140%;
        transform: translateX(-50%);
        background: #111;
        color: #fff;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
        z-index: 9999;
      }
      .help-tip:hover::after { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="sidebar sidebar-dark sidebar-fixed border-end" id="sidebar">
      <div class="sidebar-brand d-none d-md-flex">
        X‑UI Bot Admin
      </div>
      <ul class="sidebar-nav" data-coreui="navigation" data-simplebar>
        <li class="nav-item">
          <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-2"></i>Главная
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'plans' %}active{% endif %}" href="/plans">
            <i class="bi bi-box-seam me-2"></i>Тарифы
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'users' %}active{% endif %}" href="/users">
            <i class="bi bi-people me-2"></i>Пользователи
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'subscriptions' %}active{% endif %}" href="/subscriptions">
            <i class="bi bi-card-checklist me-2"></i>Подписки
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'orders' %}active{% endif %}" href="/orders">
            <i class="bi bi-receipt me-2"></i>Заказы
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'promos' %}active{% endif %}" href="/promos">
            <i class="bi bi-ticket-perforated me-2"></i>Промокоды
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'content' %}active{% endif %}" href="/content">
            <i class="bi bi-ui-checks-grid me-2"></i>Контент
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'broadcast' %}active{% endif %}" href="/broadcast">
            <i class="bi bi-megaphone me-2"></i>Рассылка
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'settings' %}active{% endif %}" href="/settings">
            <i class="bi bi-gear me-2"></i>Настройки
          </a>
        </li>
      </ul>
    </div>

    <div class="wrapper d-flex flex-column min-vh-100 bg-light">
      <header class="header header-sticky mb-4">
        <div class="container-fluid">
          <button class="header-toggler px-md-0 me-md-3" type="button" onclick="toggleSidebar()">
            <span class="navbar-toggler-icon"></span>
          </button>
          <span class="header-brand">Админ‑панель</span>
          <div class="header-nav ms-auto">
            <button class="btn btn-outline-secondary btn-sm me-2" onclick="toggleTheme()">
              <i class="bi bi-moon-stars me-1"></i>Тема
            </button>
            <a class="btn btn-outline-danger btn-sm" href="/logout">
              <i class="bi bi-box-arrow-right me-1"></i>Выйти
            </a>
          </div>
        </div>
      </header>

      <div class="body flex-grow-1">
        <div class="container-lg px-3">
          {% block content %}{% endblock %}
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/js/coreui.bundle.min.js"></script>
    <script>
      const root = document.documentElement;
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) root.setAttribute("data-coreui-theme", savedTheme);
      if (root.getAttribute("data-coreui-theme") === "dark") {
        document.body.classList.remove("bg-light");
        document.body.classList.add("bg-dark");
      }
      function toggleTheme() {
        const next = root.getAttribute("data-coreui-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-coreui-theme", next);
        localStorage.setItem("theme", next);
        if (next === "dark") {
          document.body.classList.remove("bg-light");
          document.body.classList.add("bg-dark");
        } else {
          document.body.classList.remove("bg-dark");
          document.body.classList.add("bg-light");
        }
      }
      function toggleSidebar() {
        document.body.classList.toggle("sidebar-show");
      }
      function attachSearch(inputId, tableId) {
        const input = document.getElementById(inputId);
        const table = document.getElementById(tableId);
        if (!input || !table) return;
        input.addEventListener("input", () => {
          const query = input.value.toLowerCase();
          const rows = table.querySelectorAll("tbody tr");
          rows.forEach((row) => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? "" : "none";
          });
        });
      }
    </script>
  </body>
</html>
