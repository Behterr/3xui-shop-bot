{% extends "base.html" %}
{% block content %}
<div class="page-title">Пользователи</div>
<div class="card">
  <div class="card-header">Пользователи</div>
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <input id="usersSearch" class="form-control form-control-sm search-input" placeholder="Поиск по пользователям..." />
      <span class="text-muted small">Всего: {{ users | length }}</span>
    </div>
    <div class="table-responsive">
      <table id="usersTable" class="table align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>TG ID</th>
            <th>Username</th>
            <th>Имя</th>
            <th>Баланс</th>
            <th>Создан</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for u in users %}
          <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
            <td>{{ u[3] }}</td>
            <td>
              <form method="post" action="/users/{{ u[0] }}/balance" class="d-flex gap-2">
                <input class="form-control form-control-sm" name="balance" type="number" value="{{ u[4] or 0 }}" />
                <button class="btn btn-outline-primary btn-sm" type="submit">Сохранить</button>
              </form>
            </td>
            <td>{{ u[5] }}</td>
            <td>
              <a class="btn btn-outline-secondary btn-sm" href="/users/{{ u[0] }}">Открыть</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
  attachSearch("usersSearch", "usersTable");
</script>
{% endblock %}
