<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/css/coreui.min.css" rel="stylesheet">
    <style>
      body { background: #f4f6f8; }
      .login-card { max-width: 420px; }
    </style>
  </head>
  <body class="d-flex align-items-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 login-card">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h3 class="mb-3">Вход в админ‑панель</h3>
              <form method="post" action="/login">
                <div class="mb-3">
                  <label class="form-label">Логин</label>
                  <input class="form-control" name="username" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Пароль</label>
                  <input class="form-control" name="password" type="password" required />
                </div>
                <button class="btn btn-primary w-100" type="submit">Войти</button>
              </form>
              {% if error %}<div class="text-danger mt-3">{{ error }}</div>{% endif %}
            </div>
          </div>
          <p class="text-muted text-center mt-3">Поменяйте пароль после первого входа.</p>
        </div>
      </div>
    </div>
  </body>
</html>
